name: Build and Release Agent

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    environment: prod
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux
            artifact: clawfeeder-agent-linux
          - os: windows-latest
            target: windows
            artifact: clawfeeder-agent-windows.exe
          - os: macos-15-intel
            target: macos-x86_64
            artifact: clawfeeder-agent-macos-x86_64
          - os: macos-latest
            target: macos-arm64
            artifact: clawfeeder-agent-macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements.build.txt

      - name: Generate build config
        if: runner.os != 'Windows'
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        shell: bash
        run: |
          url="${BASE_URL:-https://clawfeeder.treero-ai.com}"
          printf 'BASE_URL = "%s"\nHEARTBEAT_INTERVAL = 60\n' "$url" > src/_build_config.py

      - name: Generate build config (Windows)
        if: runner.os == 'Windows'
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        shell: pwsh
        run: |
          $url = if ($env:BASE_URL) { $env:BASE_URL } else { "https://clawfeeder.treero-ai.com" }
          "BASE_URL = `"$url`"`nHEARTBEAT_INTERVAL = 60" | Out-File -FilePath src/_build_config.py -Encoding utf8NoBOM

      - name: Build binary
        run: pyinstaller --onefile --name clawfeeder-agent --clean entrypoint.py

      - name: Rename artifact
        if: runner.os != 'Windows'
        run: mv dist/clawfeeder-agent dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: Move-Item dist/clawfeeder-agent.exe dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/clawfeeder-agent-linux/clawfeeder-agent-linux release/
          cp artifacts/clawfeeder-agent-macos-x86_64/clawfeeder-agent-macos-x86_64 release/
          cp artifacts/clawfeeder-agent-macos-arm64/clawfeeder-agent-macos-arm64 release/
          cp artifacts/clawfeeder-agent-windows.exe/clawfeeder-agent-windows.exe release/
          cp install.sh release/
          chmod +x release/clawfeeder-agent-linux release/clawfeeder-agent-macos-*

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            release/clawfeeder-agent-linux \
            release/clawfeeder-agent-macos-x86_64 \
            release/clawfeeder-agent-macos-arm64 \
            release/clawfeeder-agent-windows.exe \
            release/install.sh \
            --title "ClawFeeder Agent ${{ github.ref_name }}" \
            --generate-notes
