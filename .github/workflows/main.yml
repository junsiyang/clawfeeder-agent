name: Build and Release Agent

on:
  # 💡 触发器 1：纯手动触发 (强烈推荐 MVP 阶段使用)
  # 加上这行后，你的 GitHub 页面会出现一个 "Run workflow" 的按钮，随时可以点！
  workflow_dispatch:

  # 💡 触发器 2：基于 Tag 触发 (真正的自动化发版)
  # 只有当你打上比如 v1.0.0 这种版本标签推送到 GitHub 时，才会触发打包，平时提交代码不会浪费资源。
  push:
    tags:
      - 'v*'

jobs:
  build-agent:
    name: Build on ${{ matrix.os }}
    # 核心魔法：定义一个操作系统矩阵
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    # 让 GitHub 动态分配机器
    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 安装依赖并打包 (PyInstaller)
        run: |
          pip install pyinstaller cryptography httpx
          pyinstaller --onefile agent.py
